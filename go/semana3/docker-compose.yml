services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: noah
      POSTGRES_PASSWORD: noah123
      POSTGRES_DB: noah_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noah -d noah_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - noah_network

  api:
    build:
      context: ./api-go
    ports:
      - "8082:8080"
    environment:
      DATABASE_URL: postgresql://noah:noah123@db:5432/noah_db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - noah_network

networks:
  noah_network:


